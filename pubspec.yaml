name: dnsly_app
description: DNSly - Anti-censorship iOS client

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  share_plus: ^10.1.4
  encrypt: ^5.0.3
  crypto: ^3.0.6
  cryptography: ^2.7.0
  file_picker: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.1


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/WHITHOUT CURVE.png"  
  macos:
    generate: true
    image_path: "assets/WHITHOUT CURVE .png"
  windows:
    generate: true
    image_path: "assets/WHITHOUT CURVE .png"

flutter:
  uses-material-design: true
