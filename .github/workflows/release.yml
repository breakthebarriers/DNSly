name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-xcframework:
    name: Build Tunnel.xcframework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install gomobile
        working-directory: go
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Tunnel.xcframework
        working-directory: go
        run: make ios

      - name: Zip xcframework
        run: |
          cd ios/Frameworks
          zip -r Tunnel.xcframework.zip Tunnel.xcframework

      - name: Upload xcframework zip
        uses: actions/upload-artifact@v4
        with:
          name: xcframework-zip
          path: ios/Frameworks/Tunnel.xcframework.zip

  build-server:
    name: Build Server (Linux amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build server binary
        working-directory: server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o dnsly-server .

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: server/dnsly-server

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-xcframework, build-server]
    permissions:
      contents: write

    steps:
      - name: Download xcframework zip
        uses: actions/download-artifact@v4
        with:
          name: xcframework-zip

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Tunnel.xcframework.zip
            dnsly-server
