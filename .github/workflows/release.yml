name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-xcframework:
    name: Build Tunnel.xcframework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install gomobile
        working-directory: go
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Tunnel.xcframework
        working-directory: go
        run: make ios

      - name: Zip xcframework
        run: |
          cd ios/Frameworks
          zip -r Tunnel.xcframework.zip Tunnel.xcframework

      - name: Upload xcframework zip
        uses: actions/upload-artifact@v4
        with:
          name: xcframework-zip
          path: ios/Frameworks/Tunnel.xcframework.zip

  build-server:
    name: Build Server (Linux amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build server binary
        working-directory: server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o dnsly-server .

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: server/dnsly-server

  build-ipa:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ─── Code Signing ────────────────────────────────────────────────────────
      # To enable signing, add these secrets in your repo:
      #   APPLE_CERTIFICATE_BASE64   → base64-encoded .p12 file
      #   APPLE_CERTIFICATE_PASSWORD → .p12 export password
      #   APPLE_PROVISIONING_PROFILE → base64-encoded .mobileprovision file
      #
      # Encode locally with:
      #   base64 -i Certificates.p12 | pbcopy
      #   base64 -i DNSly.mobileprovision | pbcopy
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install Apple certificate and provisioning profile
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA (signed)
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: flutter build ipa --release

      - name: Build IPA (unsigned fallback)
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 == '' }}
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r DNSly-unsigned.ipa Payload
          rm -rf Payload
          mkdir -p build/ios/ipa
          mv DNSly-unsigned.ipa build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            build/ios/ipa/*.ipa
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-xcframework, build-server, build-ipa]
    permissions:
      contents: write

    steps:
      - name: Download xcframework zip
        uses: actions/download-artifact@v4
        with:
          name: xcframework-zip

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Tunnel.xcframework.zip
            dnsly-server
            *.ipa
